name: Wiki Sync

on:
  push:
    branches:
      - main
    paths:
      - docs/wiki/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone Wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Sync docs/wiki to GitHub Wiki
        run: |
          rsync -av --delete --exclude ".git" docs/wiki/ wiki/

      - name: Commit and push wiki changes
        run: |
          cd wiki
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git add .
          git commit -m "docs(wiki): sync from repo ${GITHUB_SHA::7}"
          git push
